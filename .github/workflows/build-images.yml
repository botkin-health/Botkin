name: Build images

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Ветка/тег/SHA для сборки"
        default: main
  workflow_call:
    inputs:
      ref:
        type: string
        default: main
    outputs:
      image_sha:
        description: "Short SHA, которым собраны все образы"
        value: ${{ jobs.resolve.outputs.sha_short }}

permissions:
  contents: read
  packages: write

jobs:
  # Единый sha на все сервисы — чтобы образы были собраны с одного коммита.
  resolve:
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.sha.outputs.short }}
      sha_full: ${{ steps.sha.outputs.full }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - id: sha
        run: |
          echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "full=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: bot
            dockerfile: Dockerfile.bot
            image: ghcr.io/botkin-health/botkin-bot
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ needs.resolve.outputs.sha_short }}
            ${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

name: "[ops] Применить TELEGRAM_WEBHOOK_SECRET"

on:
  workflow_dispatch:
    inputs:
      secret_token:
        description: "TELEGRAM_WEBHOOK_SECRET (hex, 32+ байта)"
        required: true

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Добавить секрет в .env и перерегистрировать webhook
        env:
          SECRET_TOKEN: ${{ github.event.inputs.secret_token }}
          SSH_TARGET: ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
        run: |
          printf "SECRET_TOKEN='%s'\n" "$SECRET_TOKEN" | ssh "$SSH_TARGET" bash -s <<'REMOTE'
            set -euo pipefail
            cd /opt/botkin
            # upsert TELEGRAM_WEBHOOK_SECRET в .env
            if grep -q '^TELEGRAM_WEBHOOK_SECRET=' .env; then
              sed -i "s/^TELEGRAM_WEBHOOK_SECRET=.*/TELEGRAM_WEBHOOK_SECRET=$SECRET_TOKEN/" .env
              echo "✅ TELEGRAM_WEBHOOK_SECRET обновлён"
            else
              printf '\nTELEGRAM_WEBHOOK_SECRET=%s\n' "$SECRET_TOKEN" >> .env
              echo "✅ TELEGRAM_WEBHOOK_SECRET добавлен"
            fi
            # Получить TELEGRAM_BOT_TOKEN из .env
            BOT_TOKEN=$(grep '^TELEGRAM_BOT_TOKEN=' .env | cut -d= -f2 | tr -d "'" | tr -d '"')
            if [ -z "$BOT_TOKEN" ]; then
              echo "❌ TELEGRAM_BOT_TOKEN не найден в .env"; exit 1
            fi
            # Перерегистрировать webhook с secret_token
            WEBHOOK_URL=$(grep '^WEBHOOK_URL=' .env | cut -d= -f2 | tr -d "'" | tr -d '"')
            if [ -z "$WEBHOOK_URL" ]; then
              WEBHOOK_URL="https://health.orangegate.cc/webhook"
              echo "ℹ️  WEBHOOK_URL не найден в .env, используем дефолт: $WEBHOOK_URL"
            fi
            RESULT=$(curl -sSf "https://api.telegram.org/bot${BOT_TOKEN}/setWebhook" \
              -d "url=${WEBHOOK_URL}" \
              -d "secret_token=${SECRET_TOKEN}")
            echo "setWebhook response: $RESULT"
            # Рестарт бота
            docker restart healthvault_bot
            echo "✅ Бот перезапущен"
          REMOTE

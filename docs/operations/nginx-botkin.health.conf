server {
    listen 80;
    server_name botkin.health www.botkin.health;

    # Cloudflare terminates SSL, we serve HTTP here.
    # Real IP from Cloudflare edge ranges.
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    root /opt/botkin-site/;
    index index.html;

    # ── Backend (бот FastAPI на :8081) ───────────────────────────────────────
    # Mini-app, его API и публичные ссылки бота должны идти на бот, а НЕ на
    # статику лендинга. См. issue #212 (переезд mini-app на botkin.health).
    #
    # ⚠️ Модификатор `^~` ОБЯЗАТЕЛЕН. Без него префиксный `location /webapp/`
    # проигрывает регекс-локации `~* \.(css|js|...)$` ниже для файлов
    # api.js / dashboard.js / settings.js / *.css — и nginx отдаёт их как
    # статику лендинга из /opt/botkin-site/ (404 / чужой файл). `^~` означает
    # «если префикс совпал — регексы не проверять».
    #
    # Эти location-блоки на проде живут в snippets/botkin-backend.conf и
    # подключаются через `include`; здесь приведён целевой результат целиком.
    location ^~ /webapp/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Все /api/* (питание, добавки, профиль, settings, dashboard_url,
    # data_sources #150, agent-тулзы /api/agent/*). Лендинг своих /api/ не имеет.
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Публичные ссылки бота: дашборд /mc/{token} (/share, iframe мини-аппа)
    # и HTML-отчёты /r/{token} (/report, #204).
    location ^~ /mc/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ^~ /r/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Прочие backend-пути, которые уже проксировались на бот до #212
    # (оставлены для полноты целевого конфига): админка, webhook'и приёма данных.
    location ^~ /admin {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ^~ /apple_health {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Static landing — serve files directly.
    location / {
        try_files $uri $uri/ =404;
    }

    # Long cache for CSS/images (cheap to bust by renaming).
    # ⚠️ Эта регекс-локация ловит ВСЕ *.css/*.js на хосте, поэтому backend-пути
    # выше используют `^~` (иначе их статику перехватит этот блок).
    location ~* \.(css|js|jpg|jpeg|png|webp|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Basic security headers (TLS handled by Cloudflare).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/botkin.health.access.log;
    error_log  /var/log/nginx/botkin.health.error.log;
}

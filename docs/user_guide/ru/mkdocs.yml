site_name: "Botkin · Гайд"
site_url: https://botkin.health/guide/
site_description: "Пользовательский гайд по Botkin — персональному трекеру здоровья в Telegram."
docs_dir: docs

theme:
  name: material
  language: ru
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: light green
      accent: green
      toggle:
        icon: material/weather-night
        name: Тёмная тема
    - scheme: slate
      primary: light green
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Светлая тема
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

nav:
  - Начало:
      - Что такое Botkin: index.md
      - Как начать: start.md
  - Использование:
      - Команды бота: commands.md
      - Mini-app Дневник: dashboard.md
  - Интеграции:
      - Claude / Gemini через MCP: mcp.md
  - Прочее:
      - FAQ: faq.md
      - Что нового: changelog.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/telegram
      link: https://t.me/Botkin_md_bot
      name: Botkin в Telegram
    - icon: fontawesome/brands/github
      link: https://github.com/Lyskovsky/Botkin
      name: GitHub

copyright: "© 2026 Botkin"

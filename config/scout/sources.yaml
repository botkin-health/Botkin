# Источники для /scout-weekly.
# Каждый источник — набор запросов к публичному API.
# Запросы подобраны под profile.yaml (quantified-self, health tracking, biohacking, open source).

# GitHub — новые репозитории по темам за последнюю неделю
# API: https://api.github.com/search/repositories
# Rate limit: 10 req/min без токена, 30 с токеном
github:
  queries:
    - q: "topic:quantified-self"
      sort: updated
      per_page: 20
    - q: "topic:health-tracking pushed:>{week_ago}"
      sort: stars
      per_page: 20
    - q: "apple-health in:name,description,readme pushed:>{month_ago}"
      sort: stars
      per_page: 15
    - q: "garmin in:name,description pushed:>{month_ago} language:python"
      sort: stars
      per_page: 15
    - q: "topic:cgm created:>{month_ago}"
      sort: stars
      per_page: 10
    - q: "biohacking in:name,description pushed:>{month_ago}"
      sort: updated
      per_page: 10
    - q: "HRV in:name,description pushed:>{month_ago}"
      sort: stars
      per_page: 10
    - q: "phenoage OR dunedin-pace OR biological-age in:name,description,readme"
      sort: stars
      per_page: 10

# Hacker News через Algolia (живой поиск, rate limit щадящий)
# API: https://hn.algolia.com/api/v1/search_by_date
hn:
  queries:
    - query: "quantified self"
      tags: "story"
      window_days: 14
    - query: "apple health"
      tags: "story"
      window_days: 14
    - query: "continuous glucose"
      tags: "story"
      window_days: 30
    - query: "biohacking"
      tags: "story"
      window_days: 14
    - query: "VO2max"
      tags: "story"
      window_days: 30
    - query: "biological age"
      tags: "story"
      window_days: 30
    - query: "garmin"
      tags: "show_hn"
      window_days: 30
    - query: "health dashboard"
      tags: "show_hn"
      window_days: 30

# Reddit — отключён по умолчанию (с 2023 блокирует анонимный JSON API, 403)
# Чтобы включить: зарегистрировать script-приложение https://www.reddit.com/prefs/apps,
# добавить REDDIT_CLIENT_ID / REDDIT_CLIENT_SECRET в .env, расширить fetch_reddit() OAuth-потоком.
# Пока subreddits живут в manual_sources — Claude может сходить туда через /research.
reddit:
  enabled: false
  subreddits: [QuantifiedSelf, Biohackers, selfhosted, Garmin, Oura, PeterAttia]
  top_window: week
  limit: 25

# PubMed — свежие исследования (не код, но идеи и маркеры)
# API: https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi
pubmed:
  queries:
    - query: "wearable biosensor longitudinal AND (heart rate variability OR sleep)"
      days_back: 30
      limit: 10
    - query: "biological age OR epigenetic clock AND validation"
      days_back: 60
      limit: 10
    - query: "continuous glucose monitoring healthy non-diabetic"
      days_back: 60
      limit: 8
    - query: "omega-3 index cardiovascular outcomes"
      days_back: 90
      limit: 5

# arXiv (CS.AI для health AI агентов)
# API: http://export.arxiv.org/api/query
arxiv:
  queries:
    - query: "all:\"health monitoring\" AND all:\"LLM\""
      days_back: 30
      limit: 10
    - query: "all:\"wearable\" AND all:\"foundation model\""
      days_back: 30
      limit: 10

# Прочие ручные источники которые стоит держать в поле зрения
# (не автоматизируем, но /research может их обойти)
manual_sources:
  - https://www.reddit.com/r/QuantifiedSelf/wiki/index
  - https://github.com/woop/awesome-quantified-self
  - https://github.com/shuowang-ai/awesome-digital-health
  - https://openhumans.org/projects/
  - https://blueprint.bryanjohnson.com/
  - https://singularityclub.tech/
  - https://www.nightscout.info/

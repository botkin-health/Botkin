services:
  postgres:
    image: postgres:15
    container_name: healthvault_postgres
    environment:
      POSTGRES_DB: healthvault
      POSTGRES_USER: healthvault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthvault"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    # Образ из GHCR — собирается в GitHub Actions, на сервере только pull.
    # IMAGE_TAG задаёт deploy-workflow (sha коммита) или откат на прошлый тег.
    image: ghcr.io/botkin-health/botkin-bot:${IMAGE_TAG:-latest}
    container_name: healthvault_bot
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://healthvault:${POSTGRES_PASSWORD}@postgres:5432/healthvault
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Операционные данные/логи — на хосте, переживают pull/up (не в образе).
      - /opt/botkin/data:/app/data
      - /opt/botkin/logs:/app/logs
      # Nightly pg_dump из cron сервера — админ-панель читает их как /app/backups.
      - /opt/backups:/app/backups
    ports:
      # nginx на хосте проксирует https://health.orangegate.cc → 127.0.0.1:8081.
      # Bind на loopback — наружу порт не открыт. Caddy-ingress — отдельная задача.
      - "127.0.0.1:8081:8081"
    networks:
      - internal   # доступ к postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8081/health\", timeout=5)' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local

networks:
  internal:
    driver: bridge

services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15
    container_name: healthvault_postgres
    environment:
      POSTGRES_DB: healthvault
      POSTGRES_USER: healthvault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - healthvault_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthvault"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Telegram бот
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthvault_bot
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://healthvault:${POSTGRES_PASSWORD}@postgres:5432/healthvault
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      # Bind-mount исходников — чтобы деплой не требовал rebuild image и
      # docker-compose up не сбрасывал свежие правки. Источник истины — хост.
      # Без этих маунтов любое изменение скрипта/handler'а требовало
      # docker cp + restart; теперь — scp + restart, и .py-файлы видны сразу.
      - ./telegram-bot:/app/telegram-bot
      - ./core:/app/core
      - ./database:/app/database
      - ./scripts:/app/scripts
      - ./config:/app/config
      - ./services:/app/services
      - ./helpers:/app/helpers
      - ./domain:/app/domain
    networks:
      - healthvault_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f bot.py || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx (опционально, для веб-интерфейса в будущем)
  # nginx:
  #   image: nginx:alpine
  #   container_name: healthvault_nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf
  #     - ./nginx/certs:/etc/nginx/certs
  #   networks:
  #     - healthvault_network
  #   restart: always

volumes:
  postgres_data:
    driver: local

networks:
  healthvault_network:
    driver: bridge
